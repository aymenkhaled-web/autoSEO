version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: autoseo_dev
      POSTGRES_USER: autoseo
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoseo -d autoseo_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://autoseo:devpassword@postgres:5432/autoseo_dev
      - REDIS_URL=redis://redis:6379/0

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../workers:/app/workers
      - ../packages:/app/packages
    environment:
      - DATABASE_URL=postgresql+asyncpg://autoseo:devpassword@postgres:5432/autoseo_dev
      - REDIS_URL=redis://redis:6379/0

volumes:
  pgdata:
